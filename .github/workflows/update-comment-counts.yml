name: Update Comment Counts

on:
  discussion:
    types: [created, deleted, transferred]
  discussion_comment:
    types: [created, deleted]
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'

jobs:
  update-counts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const query = `
              query($owner: String!, $repo: String!, $categoryId: ID!, $cursor: String) {
                repository(owner: $owner, name: $repo) {
                  discussions(first: 100, after: $cursor, categoryId: $categoryId) {
                    pageInfo { hasNextPage endCursor }
                    nodes {
                      title
                      comments(first: 100) {
                        totalCount
                        nodes {
                          replies { totalCount }
                        }
                      }
                    }
                  }
                }
              }
            `;

            let allDiscussions = [];
            let cursor = null;
            let hasNext = true;

            while (hasNext) {
              const result = await github.graphql(query, {
                owner: 'junowhite23',
                repo: 'junowhite23.github.io',
                categoryId: 'DIC_kwDOSdm-sM4C9HPP',
                cursor: cursor
              });

              const disc = result.repository.discussions;
              allDiscussions.push(...disc.nodes);
              hasNext = disc.pageInfo.hasNextPage;
              cursor = disc.pageInfo.endCursor;
            }

            const counts = {};
            allDiscussions.forEach(d => {
              if (!d.title) return;
              let total = d.comments.totalCount;
              d.comments.nodes.forEach(c => {
                total += c.replies.totalCount;
              });
              if (total > 0) counts[d.title] = total;
            });

            fs.mkdirSync('data', { recursive: true });
            fs.writeFileSync('data/comment-counts.json', JSON.stringify(counts));
            console.log('Updated counts:', counts);

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/comment-counts.json
          git diff --staged --quiet || (git commit -m "chore: update comment counts" && git push)